<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO Dashboard - Test de Conexión</title>
    <link rel="stylesheet" href="css/index.css">
    <script src="js/app.js"></script>
</head>
<body>

    <div class="container">
        <h2>Ingreso de Datos</h2>
        <form id="dataForm">

            <!-- Nombre -->
            <label for="marca">Nombre de la Marca / Empresa:</label>
            <input type="text" id="marca" placeholder="Ej: Nike, Apple, Mi Empresa" >

            <!-- Website -->
            <label for="website">Sitio Web:</label>
            <input type="url" id="website" placeholder="https://www.miempresa.com" >

            <!-- Rubro (ahora largo) -->
            <label for="rubro">Rubro / Descripción del negocio:</label>
            <textarea id="rubro" rows="4" 
                placeholder="Describe en detalle a qué se dedica la empresa, qué vende, a quién apunta, etc."
                ></textarea>

            <!-- Ubicación -->
            <label for="ubicacion">Ubicación:</label>
            <input type="text" id="ubicacion" placeholder="Ej: Buenos Aires, Argentina" >

            <!-- Tamaño empresa -->
            <label for="empleados">Tamaño de la empresa:</label>
            <select id="empleados" >
                <option value="">Seleccionar</option>
                <option value="1-10">1 - 10 empleados</option>
                <option value="11-50">11 - 50 empleados</option>
                <option value="51-200">51 - 200 empleados</option>
                <option value="201-500">201 - 500 empleados</option>
                <option value="500+">Más de 500 empleados</option>
            </select>

            <!-- Precios -->
            <label>Rango de Precios:</label>
            <div class="precio-container">
                <input type="number" id="precioMin" placeholder="Mínimo" min="0" >
                <input type="number" id="precioMax" placeholder="Máximo" min="0" >
            </div>
            <button type="submit" id="btnAnalizar">Generar Análisis</button>
            
        </form>

        <div id="resultado"></div>
    </div>
    

</body>
</html>
