<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO Dashboard - Test de Conexión</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: #bb86fc; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #b3b3b3;}
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #2d2d2d;
            color: white;
            box-sizing: border-box;
        }
        .precio-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .precio-container input {
            margin-bottom: 0;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #bb86fc;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #9965f4; }
        
        #resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #000;
            border: 1px solid #333;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            color: #00ff00;
            white-space: pre-wrap;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Ingreso de Datos</h2>
        <form id="dataForm">
            <label for="marca">Nombre de la Marca:</label>
            <input type="text" id="marca" placeholder="Ej: Nike, Apple, Mi Empresa" required>

            <label for="rubro">Rubro:</label>
            <input type="text" id="rubro" placeholder="Ej: Venta de Hardware" required>

            <label for="ubicacion">Ubicación:</label>
            <input type="text" id="ubicacion" placeholder="Ej: Buenos Aires" required>

            <label>Rango de Precios:</label>
            <div class="precio-container">
                <input type="number" id="precioMin" placeholder="Mínimo" min="0" required>
                <input type="number" id="precioMax" placeholder="Máximo" min="0" required>
            </div>

            <button type="submit" id="btnAnalizar">Generar Análisis</button>
        </form>

        <div id="resultado"></div>
    </div>

    <script>
        const form = document.getElementById('dataForm');
        const resultadoDiv = document.getElementById('resultado');
        const btnAnalizar = document.getElementById('btnAnalizar');

        form.addEventListener('submit', async function(evento) {
            evento.preventDefault(); 

            btnAnalizar.innerText = "Analizando...";
            resultadoDiv.style.display = "block";
            resultadoDiv.innerText = "Conectando con el backend...";

            // JSON ACTUALIZADO PARA EL BACKEND CON LA MARCA
            const datosParaBackend = {
                marca: document.getElementById('marca').value,
                rubro: document.getElementById('rubro').value,
                ubicacion: document.getElementById('ubicacion').value,
                precio_min: document.getElementById('precioMin').value,
                precio_max: document.getElementById('precioMax').value
            };

            try {
                const urlDelBackend = 'http://localhost:8000/evaluacion'; 

                const respuesta = await fetch(urlDelBackend, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(datosParaBackend)
                });

                const datosRecibidos = await respuesta.json();
                resultadoDiv.innerText = JSON.stringify(datosRecibidos, null, 2);

            } catch (error) {
                console.error("Error en la conexión:", error);
                resultadoDiv.innerText = "Error de conexión. ¿Está el backend encendido y en la URL correcta?";
            } finally {
                btnAnalizar.innerText = "Generar Análisis";
            }
        });
    </script>
</body>
</html>
